<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Para Você ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: 'Segoe UI', sans-serif;
    background: linear-gradient(135deg,#ffdde1,#ee9ca7);
    min-height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
}

.container{
    width:85%;
    max-width:500px; /* Reduzido de 700px para ficar mais compacto */
    text-align:center;
    background:rgba(255,255,255,0.15);
    backdrop-filter: blur(15px);
    padding:25px; /* Reduzido de 40px */
    border-radius:20px; /* Elementos mais delicados */
    box-shadow:0 8px 32px rgba(0,0,0,0.15);
    display: none; 
}

.btn-iniciar {
    padding: 12px 25px; /* Reduzido */
    font-size: 1.05rem; /* Reduzido */
    font-weight: bold;
    color: #ee9ca7;
    background: white;
    border: none;
    border-radius: 50px;
    cursor: pointer;
    box-shadow: 0 8px 16px rgba(0,0,0,0.15);
    transition: 0.3s;
    z-index: 10;
}

.btn-iniciar:hover {
    transform: scale(1.05);
    background: #fff0f2;
}

.foto{
    width:160px; /* Reduzido de 220px */
    height:160px; /* Reduzido de 220px */
    border-radius:50%;
    object-fit:cover;
    border:4px solid white; /* Mais fino */
    box-shadow:0 0 20px rgba(255,255,255,0.6);
    margin-bottom:15px;
}

.frase{
    font-size:1.3rem; /* Reduzido de 1.7rem para não quebrar tantas linhas no celular */
    color:white;
    font-weight:600;
    opacity:0;
    transform:translateY(20px);
    transition:1s; 
    margin-top:15px;
    text-shadow:1px 1px 8px rgba(0,0,0,0.25);
    line-height: 1.4;
}

.show{
    opacity:1;
    transform:translateY(0);
}

.coracao{
    position:absolute;
    color:white;
    font-size:25px;
    animation:subir 6s linear infinite; 
    z-index: -1;
}

@keyframes subir{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-120px);
        opacity:0;
    }
}
</style>
</head>
<body>

<!-- Botão inicial -->
<button id="btnPlay" class="btn-iniciar">Abrir Recado ❤️</button>

<div class="container" id="conteudo">

    <!-- TROQUE foto.jpg PELA FOTO DELA -->
    <img src="fernanda.jpeg" class="foto" alt="Foto">

    <div id="f1" class="frase">
        Bom dia, bom dia coisa linda ☕
    </div>

    <div id="f2" class="frase">
        Dormiu bem ? 💤
    </div>

    <div id="f3" class="frase">
        Esse é um recado pra você,<br><br>

        tenha um ótimo dia, estou gostando muito de você ❤️<br><br>

        e quero que saiba que mesmo com pouco tempo,<br>
        queria que ficasse pra sempre 🥹<br><br>

        queria que fosse a última pessoa da minha vida.
    </div>

</div>

<!-- Elemento HTML5 nativo para tocar MP3 (sem propagandas e funciona 100% no celular) -->
<audio id="musica">
    <!-- COLOQUE O SEU ARQUIVO MP3 AQUI -->
    <!-- Exemplo local: src="musica.mp3" -->
    <!-- Exemplo online: src="https://seusite.com/musica.mp3" -->
    <source src="Jade LeMac.mp3" type="audio/mpeg">
    Seu navegador não suporta o elemento de áudio.
</audio>

<script>
const btnPlay = document.getElementById('btnPlay');
const conteudo = document.getElementById('conteudo');
const musica = document.getElementById('musica');

btnPlay.addEventListener('click', () => {
    // Esconde o botão e mostra o conteúdo
    btnPlay.style.display = 'none';
    conteudo.style.display = 'block';

    // Configura a música para iniciar exatamente em 55 segundos
    musica.currentTime = 55; 
    
    // Toca o arquivo MP3 local (funciona direto no celular após o clique)
    musica.play().catch(e => console.log("Erro ao tocar áudio:", e));

    // Cronograma das frases (Ajustado e rápido)
    setTimeout(()=>{
        document.getElementById('f1').classList.add('show');
    }, 600); 

    setTimeout(()=>{
        document.getElementById('f2').classList.add('show');
    }, 3200); 

    setTimeout(()=>{
        document.getElementById('f3').classList.add('show');
    }, 6200); 

    // Inicia a chuva de corações
    setInterval(criarCoracao, 350);
});

function criarCoracao(){
    const c = document.createElement("div");

    c.classList.add("coracao");
    c.innerHTML = "❤️";

    c.style.left = Math.random()*100+"vw";
    c.style.fontSize = (15 + Math.random()*20)+"px"; // Corações um pouco menores também

    document.body.appendChild(c);

    setTimeout(()=>{
        c.remove();
    }, 6000);
}
</script>

</body>
</html>
