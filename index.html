<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>❤️ Para Você ❤️</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(135deg,#ffccd5,#ff8fab);
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    overflow:hidden;
}

.container{
    width:90%;
    max-width:500px;
    text-align:center;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(10px);
    padding:25px;
    border-radius:25px;
}

.foto{
    width:160px;
    height:160px;
    border-radius:50%;
    object-fit:cover;
    border:4px solid white;
    margin-bottom:15px;
    box-shadow:0 0 20px rgba(255,255,255,.8);
}

.frase{
    color:white;
    font-size:1.3rem;
    line-height:1.5;
    opacity:0;
    transform:translateY(15px);
    transition:0.8s;
    margin-top:12px;
    text-shadow:1px 1px 8px rgba(0,0,0,.3);
}

.show{
    opacity:1;
    transform:translateY(0);
}

.coracao{
    position:absolute;
    font-size:22px;
    animation:subir 6s linear forwards;
}

@keyframes subir{
    from{
        transform:translateY(100vh);
        opacity:1;
    }
    to{
        transform:translateY(-100px);
        opacity:0;
    }
}
</style>
</head>
<body>

<div class="container">

    <!-- coloque a foto dela na mesma pasta -->
    <img src="fernanda.jpeg" class="foto">

    <div id="f1" class="frase">
        Bom dia, bom dia coisa linda ☕
    </div>

    <div id="f2" class="frase">
        Dormiu bem ? 💤
    </div>

    <div id="f3" class="frase">
        Esse é um recado pra você,<br><br>

        tenha um ótimo dia,<br>
        estou gostando muito de você ❤️<br><br>

        e quero que saiba que mesmo com pouco tempo,<br>
        queria que ficasse pra sempre 🥹<br><br>

        queria que fosse a última pessoa da minha vida.
    </div>

</div>

<audio id="musica" autoplay>
    <source src="Jade LeMac.mp3" type="audio/mpeg">
</audio>

<script>

// começa em 0:55
const musica = document.getElementById('musica');

musica.addEventListener('loadedmetadata',()=>{
    musica.currentTime = 55;
});

// frases mais rápidas
setTimeout(()=>{
    document.getElementById('f1').classList.add('show');
},500);

setTimeout(()=>{
    document.getElementById('f2').classList.add('show');
},2500);

setTimeout(()=>{
    document.getElementById('f3').classList.add('show');
},4500);

// corações
function criarCoracao(){

    const c = document.createElement('div');

    c.className='coracao';
    c.innerHTML='❤️';

    c.style.left=Math.random()*100+'vw';

    document.body.appendChild(c);

    setTimeout(()=>{
        c.remove();
    },6000);
}

setInterval(criarCoracao,300);

</script>

</body>
</html>
